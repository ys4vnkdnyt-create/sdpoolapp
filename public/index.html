<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#42b8c8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />
    <meta name="apple-mobile-web-app-title" content="Lap Lanes" />
    <meta name="description" content="Find open lap lanes at San Diego pools" />
    <title>SD Lap Lane Finder</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <!-- Screen 1: search (date, time, location) -->
      <section id="screen-search" class="screen">
        <header class="hero">
          <img
            class="hero__art"
            src="/hero-swimmer.png"
            alt="Swimmer doing freestyle"
            width="344"
            height="224"
          />
          <h1 class="hero__title">When do you want to swim?</h1>
          <p class="hero__subtitle">Find open lap lanes near you</p>
        </header>

        <div class="panel">
          <p class="label">Date</p>
          <div id="date-pills" class="pill-row"></div>

          <label class="label" for="date-picker">Or pick a date</label>
          <input
            id="date-picker"
            class="field-input date-picker"
            type="date"
            aria-label="Pick a swim date"
          />

          <label class="label" for="time-picker">Time</label>
          <input
            id="time-picker"
            class="field-input time-picker"
            type="time"
            step="1800"
            aria-label="Pick a swim time"
          />
          <p id="time-hint" class="field-hint" hidden></p>

          <div class="search-actions">
            <button
              id="find-lanes"
              type="button"
              class="btn btn--primary"
            >
              <span class="btn__label">Find Open Lanes</span>
            </button>
            <button
              id="use-location"
              type="button"
              class="btn btn--secondary btn--compact btn--location"
            >
              <span class="btn__label">Use my location</span>
            </button>
          </div>
          <p id="location-label" class="location-hint" aria-live="polite">
            Optional — sorts pools by distance from you
          </p>
        </div>
      </section>

      <!-- Screen 2: results list -->
      <section id="screen-results" class="screen" hidden>
        <header class="results-bar">
          <button id="back-to-search" type="button" class="btn-back" aria-label="Back">
            ←
          </button>
          <h1 id="results-header" class="results-bar__title">Open lanes</h1>
        </header>

        <div class="panel panel--results">
          <p class="label">Sort</p>
          <div id="sort-pills" class="pill-row">
            <button type="button" class="pill" data-sort="distance">Distance</button>
            <button type="button" class="pill" data-sort="cost">Cost</button>
          </div>

          <div id="results-list" class="results-list"></div>

          <section id="no-schedule-section" class="no-schedule-section" hidden>
            <h2 class="no-schedule-section__title">
              Nearby — schedule not in app yet
            </h2>
            <p class="no-schedule-section__hint">
              These pools are nearby; lap times are not loaded yet. Use View
              schedule or Call pool on each card to confirm hours.
            </p>
            <div id="no-schedule-list" class="results-list"></div>
          </section>

          <p id="results-footer" class="results-footer"></p>
        </div>
      </section>

      <nav class="bottom-nav" aria-label="Main">
        <span class="bottom-nav__item bottom-nav__item--active">Search</span>
        <span class="bottom-nav__item bottom-nav__item--muted">Saved</span>
        <span class="bottom-nav__item bottom-nav__item--muted">Profile</span>
      </nav>
    </div>

    <script type="module" src="/web/app.js"></script>
  </body>
</html>
